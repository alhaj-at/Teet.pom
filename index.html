<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Click Game PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#070a10;
  color:white;
  text-align:center;
  overflow:hidden;
}

h1{
  color:#00ffcc;
  margin-top:15px;
}

.stats{
  display:flex;
  justify-content:center;
  gap:25px;
  font-size:18px;
  margin:10px;
}

#gameArea{
  position:relative;
  width:100%;
  height:75vh;
  border-top:1px solid #222;
  border-bottom:1px solid #222;
  overflow:hidden;
}

#target{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffcc,#0066ff);
  box-shadow:0 0 25px #00ffcc;
  cursor:pointer;
  transition:0.1s;
}

button{
  padding:10px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  cursor:pointer;
}

#flash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

.explosion{
  position:absolute;
  width:20px;
  height:20px;
  background:#00ffcc;
  border-radius:50%;
  animation:boom 0.4s ease-out forwards;
}

@keyframes boom{
  0%{transform:scale(1); opacity:1;}
  100%{transform:scale(5); opacity:0;}
}
</style>
</head>

<body>

<h1>🎮 Click Game PRO</h1>

<div class="stats">
  <div>⏱ <span id="time">20</span></div>
  <div>🎯 <span id="score">0</span></div>
  <div>🔥 Combo <span id="combo">0</span></div>
  <div>🏆 Best <span id="best">0</span></div>
</div>

<button onclick="startGame()">ابدأ</button>

<div id="gameArea">
  <div id="flash"></div>
  <div id="target" onclick="hit()"></div>
</div>

<script>
let score = 0;
let time = 20;
let combo = 0;
let speed = 1200;
let timer;
let moveTimer;
let playing = false;

const target = document.getElementById("target");
const flash = document.getElementById("flash");

let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").innerText = best;

function randomPosition(){
  const x = Math.random() * (window.innerWidth - 80);
  const y = Math.random() * (window.innerHeight * 0.75 - 80);

  target.style.left = x + "px";
  target.style.top = y + "px";
}

function startGame(){
  score = 0;
  combo = 0;
  time = 20;
  speed = 1200;
  playing = true;

  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
  document.getElementById("time").innerText = time;

  clearInterval(timer);
  clearInterval(moveTimer);

  randomPosition();

  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      endGame();
    }
  }, 1000);

  moveTimer = setInterval(() => {
    if(playing) randomPosition();
  }, speed);
}

function hit(){
  if(!playing) return;

  score++;
  combo++;

  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;

  // زيادة السرعة مع الوقت
  if(score % 5 === 0 && speed > 400){
    speed -= 100;
    clearInterval(moveTimer);
    moveTimer = setInterval(() => {
      if(playing) randomPosition();
    }, speed);
  }

  randomPosition();

  explosionEffect();
  flashEffect();
}

function explosionEffect(){
  const boom = document.createElement("div");
  boom.className = "explosion";

  const rect = target.getBoundingClientRect();
  boom.style.left = rect.left + "px";
  boom.style.top = rect.top + "px";

  document.getElementById("gameArea").appendChild(boom);

  setTimeout(() => boom.remove(), 400);
}

function flashEffect(){
  flash.style.opacity = 0.4;
  setTimeout(()=> flash.style.opacity = 0, 100);
}

function endGame(){
  playing = false;
  clearInterval(timer);
  clearInterval(moveTimer);

  if(score > best){
    best = score;
    localStorage.setItem("bestScore", best);
  }

  document.getElementById("best").innerText = best;

  alert("انتهت اللعبة 🎯\nسكورك: " + score);
}
</script>

</body>
</html>
