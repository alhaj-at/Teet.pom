<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Click Pro Game</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f1115;
  color:white;
  text-align:center;
  overflow:hidden;
}

h1{
  margin-top:20px;
  color:#00ffcc;
}

#gameArea{
  position:relative;
  width:100%;
  height:70vh;
  border-top:2px solid #222;
  border-bottom:2px solid #222;
  overflow:hidden;
}

#target{
  position:absolute;
  width:80px;
  height:80px;
  background:radial-gradient(circle,#00ffcc,#0077ff);
  border-radius:50%;
  cursor:pointer;
  transition:0.1s;
  box-shadow:0 0 20px #00ffcc;
}

.stats{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:10px;
  font-size:18px;
}

button{
  padding:10px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<h1>🎮 Click Pro Game</h1>

<div class="stats">
  <div>⏱ الوقت: <span id="time">15</span></div>
  <div>🎯 النقاط: <span id="score">0</span></div>
  <div>🏆 أعلى نتيجة: <span id="best">0</span></div>
</div>

<button onclick="startGame()">ابدأ اللعبة</button>

<div id="gameArea">
  <div id="target" onclick="hit()"></div>
</div>

<script>
let score = 0;
let time = 15;
let timer;
let playing = false;

const target = document.getElementById("target");
const gameArea = document.getElementById("gameArea");

let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").innerText = best;

function randomPosition(){
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (gameArea.clientHeight - 100);

  target.style.left = x + "px";
  target.style.top = y + "px";
}

function startGame(){
  score = 0;
  time = 15;
  playing = true;

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;

  clearInterval(timer);

  randomPosition();

  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      endGame();
    }
  }, 1000);
}

function hit(){
  if(!playing) return;

  score++;
  document.getElementById("score").innerText = score;

  // تحريك الهدف أسرع مع الوقت
  randomPosition();

  // تأثير بصري
  target.style.transform = "scale(0.8)";
  setTimeout(()=> target.style.transform="scale(1)",100);
}

function endGame(){
  clearInterval(timer);
  playing = false;

  if(score > best){
    best = score;
    localStorage.setItem("bestScore", best);
  }

  document.getElementById("best").innerText = best;

  alert("انتهت اللعبة 🎯\nسكورك: " + score);
}
</script>

</body>
</html>
