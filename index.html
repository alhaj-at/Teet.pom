<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Cyber Click Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at center,#0a0f1f,#000);
  overflow:hidden;
  color:white;
}

/* خلفية شبكية */
.grid{
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,255,200,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,200,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  animation: moveGrid 6s linear infinite;
}

@keyframes moveGrid{
  from{transform:translateY(0);}
  to{transform:translateY(40px);}
}

h1{
  text-align:center;
  color:#00ffd5;
  margin-top:10px;
  text-shadow:0 0 15px #00ffd5;
}

#hud{
  display:flex;
  justify-content:center;
  gap:20px;
  font-size:18px;
  margin:10px;
}

.box{
  padding:8px 15px;
  background:rgba(0,255,200,0.08);
  border:1px solid rgba(0,255,200,0.3);
  border-radius:10px;
  backdrop-filter: blur(5px);
}

#gameArea{
  position:relative;
  width:100%;
  height:75vh;
}

#target{
  position:absolute;
  width:75px;
  height:75px;
  border-radius:50%;
  background: radial-gradient(circle,#00ffd5,#0066ff);
  box-shadow:0 0 20px #00ffd5, 0 0 60px #00ffd5;
  cursor:pointer;
  transition:0.12s;
  animation: pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

#flash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

.explosion{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#00ffd5;
  animation: boom 0.5s ease-out forwards;
}

@keyframes boom{
  0%{transform:scale(1); opacity:1;}
  100%{transform:scale(6); opacity:0;}
}

button{
  display:block;
  margin:0 auto;
  padding:10px 25px;
  border:none;
  border-radius:10px;
  background:#00ffd5;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #00ffd5;
}
</style>
</head>

<body>

<div class="grid"></div>

<h1>⚡ CYBER CLICK PRO</h1>

<div id="hud">
  <div class="box">⏱ <span id="time">25</span></div>
  <div class="box">🎯 <span id="score">0</span></div>
  <div class="box">🔥 Combo <span id="combo">0</span></div>
  <div class="box">🏆 Best <span id="best">0</span></div>
</div>

<button onclick="startGame()">START</button>

<div id="gameArea">
  <div id="flash"></div>
  <div id="target" onclick="hit()"></div>
</div>

<script>
let score=0, combo=0, time=25;
let playing=false;
let moveSpeed=1000;
let timer, mover;

const target=document.getElementById("target");
const flash=document.getElementById("flash");

let best=localStorage.getItem("bestCyber")||0;
document.getElementById("best").innerText=best;

/* صوت بسيط */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function beep(){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=600;
  g.gain.value=0.05;
  o.start();
  o.stop(audioCtx.currentTime+0.05);
}

function randomPos(){
  let x=Math.random()*(window.innerWidth-90);
  let y=Math.random()*(window.innerHeight*0.75-90);
  target.style.left=x+"px";
  target.style.top=y+"px";
}

function startGame(){
  score=0; combo=0; time=25; moveSpeed=1000;
  playing=true;

  document.getElementById("score").innerText=score;
  document.getElementById("combo").innerText=combo;
  document.getElementById("time").innerText=time;

  clearInterval(timer);
  clearInterval(mover);

  randomPos();

  timer=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;
    if(time<=0) endGame();
  },1000);

  mover=setInterval(()=>{ if(playing) randomPos(); }, moveSpeed);
}

function hit(){
  if(!playing) return;

  score++;
  combo++;

  document.getElementById("score").innerText=score;
  document.getElementById("combo").innerText=combo;

  beep();
  explosion();
  ripple();
  randomPos();

  // زيادة صعوبة ذكية
  if(score%5===0 && moveSpeed>300){
    moveSpeed-=120;
    clearInterval(mover);
    mover=setInterval(()=>{ if(playing) randomPos(); }, moveSpeed);
  }
}

function explosion(){
  let ex=document.createElement("div");
  ex.className="explosion";
  let r=target.getBoundingClientRect();
  ex.style.left=r.left+"px";
  ex.style.top=r.top+"px";
  document.getElementById("gameArea").appendChild(ex);
  setTimeout(()=>ex.remove(),500);
}

function ripple(){
  flash.style.opacity=0.5;
  setTimeout(()=>flash.style.opacity=0,100);
}

function endGame(){
  playing=false;
  clearInterval(timer);
  clearInterval(mover);

  if(score>best){
    best=score;
    localStorage.setItem("bestCyber",best);
  }

  document.getElementById("best").innerText=best;

  alert("🎮 انتهت اللعبة\nسكورك: "+score);
}
</script>

</body>
</html>
